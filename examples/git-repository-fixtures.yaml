---
# Static git-repository fixtures for local dev and prototype testing.
# Repo URLs align with APME mock fixtures (MOCK_PROJECTS) when ansible.apme.mockMode: true.
# SCM sync (ansibleGitContents) is not required for catalog/quality verification.
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: amazon-aws-acme-scm-github-com
  title: amazon.aws
  description: Mock git repository — 20 violations in APME fixtures
  annotations:
    backstage.io/source-location: url:https://github.com/acme-scm/amazon.aws
    backstage.io/view-url: https://github.com/acme-scm/amazon.aws
    ansible.io/scm-provider: github
    ansible.io/scm-host: github.com
    ansible.io/scm-organization: acme-scm
    ansible.io/scm-repository: amazon.aws
    ansible.io/discovery-source-id: github:acme-scm
  tags:
    - git-repository
    - github
spec:
  type: git-repository
  lifecycle: experimental
  owner: guests
  repository_name: amazon.aws
  repository_default_branch: main
  repository_collection_count: 2
  repository_ee_count: 0
