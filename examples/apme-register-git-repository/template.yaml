apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: apme-register-git-repository
  title: Register repo for Ansible Quality
  description: >-
    Registers your playbook or automation repository in the automation
    portal catalog so it appears in Git Repos and can use the Quality tab
    (scan, remediate, PR). Registers directly by default, no
    catalog-info.yaml or pull request required.
  tags:
    - apme
    - quality
    - git-repository
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Repository
      required:
        - repoUrl
        - defaultBranch
      properties:
        repoUrl:
          title: Repository location
          type: string
          description: Existing GitHub repository to register for Quality scanning
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
        defaultBranch:
          title: Default branch
          type: string
          default: main
          description: >-
            Default branch of the repository (usually main). Used for
            display and Quality scans.
        openPullRequest:
          title: Open a pull request instead
          type: boolean
          default: false
          description: >-
            Adds a catalog-info.yaml to the repository via a pull request
            instead of registering it directly. The entity only appears in
            the catalog after the pull request is merged and re-imported.

  steps:
    - id: register-direct
      name: Register in catalog
      if: ${{ not parameters.openPullRequest }}
      action: ansible:register:git-repository
      input:
        sourceControlProvider: github
        repositoryOwner: ${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}
        repositoryName: ${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
        repositoryUrl: https://github.com/${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}/${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
        defaultBranch: ${{ parameters.defaultBranch }}

    - id: fetch-base
      name: Generate catalog-info.yaml
      if: ${{ parameters.openPullRequest }}
      action: fetch:template
      input:
        url: ./content
        values:
          entityName: ${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
          repoName: ${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
          org: ${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}
          repoUrl: https://github.com/${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}/${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
          defaultBranch: ${{ parameters.defaultBranch }}
          owner: user:${{ user.entity.metadata.namespace }}/${{ user.entity.metadata.name }}

    - id: publish-pr
      name: Open pull request
      if: ${{ parameters.openPullRequest }}
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.repoUrl }}
        branchName: backstage-apme-catalog-info
        title: Add catalog-info.yaml for Ansible Quality
        description: |
          Registers this repository in the automation portal catalog as a git-repository
          so teams can run Ansible content quality scans and remediation from the Quality tab.

          After merge, import or refresh the catalog entity, then open **Quality → Register and scan**.
        token: ${{ secrets.USER_OAUTH_TOKEN }}

    - id: register-via-pr
      name: Register in catalog (optional)
      if: ${{ parameters.openPullRequest }}
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}/${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}/blob/${{ parameters.defaultBranch }}/catalog-info.yaml
        optional: true

  output:
    links:
      - title: Pull request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
      - title: Go to Git Repositories
        icon: catalog
        url: /self-service/repositories/catalog
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register-direct'].output.entityRef or steps['register-via-pr'].output.entityRef }}
    text:
      - title: Next steps
        content: |
          **If you registered directly (default):** your repository is already visible
          in **Git Repos**. Open it and go to **Quality → Register and scan** to run the
          remediation workflow (Select → Generate → Review → Push branch → Create PR).

          **If you chose to open a pull request instead:** review and merge the pull
          request first. If the entity isn't visible yet afterwards, use
          **Self-service → Catalog import** with your repo URL, then open
          **Quality → Register and scan**.
