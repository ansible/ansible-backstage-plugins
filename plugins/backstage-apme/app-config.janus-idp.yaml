# RHDH dynamic plugin wiring (legacy filename: app-config.janus-idp.yaml).
# Merged at deploy time via portal dynamic-plugins.yaml pluginConfig → app-config.dynamic-plugins.yaml.

dynamicPlugins:
  frontend:
    ansible.plugin-backstage-apme:
      appIcons:
        - name: apmeIcon
          importName: SecurityIcon
          module: '@material-ui/icons'
      apiFactories:
        - importName: gitRepositoriesExtensionsApiFactory
