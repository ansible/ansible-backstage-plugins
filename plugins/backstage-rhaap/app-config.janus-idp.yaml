---
dynamicPlugins:
  frontend:
    ansible.plugin-backstage-rhaap:
      appIcons:
        - name: AnsibleLogo
          importName: AnsibleLogo
      mountPoints:
        - mountPoint: application/listener
          importName: AppThemeFixer
      dynamicRoutes:
        - path: /ansible
          importName: AnsiblePage
          menuItem:
            icon: AnsibleLogo
            text: Ansible
