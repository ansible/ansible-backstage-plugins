---
exclude: >
  (?x)^(
    .github\/.*|
    .yarn\/.*|
    .yarnrc.yml|
    (?!api/openapi\.yaml$).*\.yaml|
    (?!api/openapi\.yaml$).*\.yml|
    .*\.map
  )$
repos:
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: remove-tabs

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-symlinks
      - id: detect-private-key

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint
        files: \.(yaml|yml)$
        exclude: ^api/
        types: [file, yaml]
        entry: yamllint --strict

  - repo: https://github.com/pycontribs/mirrors-prettier
    rev: v3.6.2
    hooks:
      - id: prettier
        always_run: true
        additional_dependencies:
          - prettier
          - prettier-plugin-toml
          - prettier-plugin-sort-json
          - '@spotify/prettier-config'
          - '@ianvs/prettier-plugin-sort-imports'
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: openapi-lint
        name: OpenAPI Spectral Lint
        entry: yarn openapi:lint
        language: system
        files: ^api/openapi\.yaml$
        types:
          - file
        pass_filenames: false
      - id: openapi-drift
        name: OpenAPI Drift Check
        entry: yarn openapi:check-drift
        language: system
        files: (^api/openapi\.yaml$|^plugins/.*/router\.ts$)
        types:
          - file
        pass_filenames: false
